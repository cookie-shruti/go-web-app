apiVersion: networking.k8s.io/v1     # API version for Ingress resource
kind: Ingress                        # Resource to expose HTTP/HTTPS routes

metadata:
  name: go-web-app                   # ⚠️ Ingress name (unique identifier)

spec:
  ingressClassName: nginx            # ⚠️ Use NGINX Ingress Controller (must be installed)

  rules:
  - host: go-web-app.local           # ⚠️ Domain name to access your app

    http:
      paths:
      - pathType: Prefix             # Match all paths starting with "/"
        path: /                      # Route all incoming requests

        backend:
          service:
            name: go-web-app         # ⚠️ Service name (must match Service YAML)
            port:
              number: 80             # ⚠️ Service port (must match Service port)