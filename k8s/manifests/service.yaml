apiVersion: v1                     # Core Kubernetes API version for Service
kind: Service                     # Resource type to expose your app

metadata:
  name: go-web-app                # ⚠️ Service name (used to access it inside cluster)
  labels:
   apps: go-web-app               # Label for identification (⚠️ keep consistent)

spec:
  selector:
    app: go-web-app   # ⚠️ MUST match pod labels (else no traffic routing)

  ports:
    - protocol: TCP              # Network protocol used
      port: 80                   # ⚠️ Port exposed by Service (external/internal access)
      targetPort: 8080           # ⚠️ Port inside container (must match app port)